            { question: "一个人在家里多 ___ 啊。", options: ["女孩儿", "没意思", "姓", "站"], correct: "没意思" },
            { question: "我家就在 ___ 那个楼。", options: ["前面", "跳舞", "过年", "位"], correct: "前面" },
            { question: "你住的 ___ 真不错。", options: ["房子", "裤子", "旁边", "眼睛"], correct: "房子" },
            { question: "那个 ___ 很可爱。", options: ["小孩儿", "包", "没意思", "姓"], correct: "小孩儿" },
            { question: "她是一个漂亮的 ___。", options: ["女孩儿", "前面", "跳舞", "站"], correct: "女孩儿" },
            { question: "他是我 ___。", options: ["男朋友", "房子", "位", "过年"], correct: "男朋友" },
            { question: "他穿着黑色的 ___。", options: ["裤子", "包", "小孩儿", "旁边"], correct: "裤子" },
            { question: "一飞，你 ___ 这位是谁？", options: ["旁边", "前面", "姓", "没意思"], correct: "旁边" }
        ];

        const grammarQuizData = [
            { question: "门外( )着一辆车。", options: ["停", "停着", "着停", "停了"], correct: "停着" },
            { question: "桌子上( )一本书。", options: ["放着", "着放", "放", "放下"], correct: "放着" },
            { question: "教室里( )很多学生。", options: ["坐着", "坐", "着坐", "坐在"], correct: "坐着" },
            { question: "树上( )一只小鸟。", options: ["停着", "着停", "停", "停上"], correct: "停着" },
            { question: "墙上( )一张画。", options: ["挂着", "挂", "着挂", "挂出"], correct: "挂着" },
            { question: "这个苹果( )大啊！", options: ["多", "很", "非常", "最"], correct: "多" },
            { question: "这件衣服( )漂亮啊！", options: ["多", "太", "真", "极"], correct: "多" },
            { question: "一个人吃饭( )没意思啊！", options: ["多", "很", "最", "极"], correct: "多" },
            { question: "你们能来，我( )高兴啊！", options: ["多", "真", "很", "太"], correct: "多" },
            { question: "昨天的天气( )好啊！", options: ["多", "很", "极", "最"], correct: "多" },
            { question: "她经常跑( )找我玩。", options: ["上来", "上去", "来上", "去上"], correct: "上来" },
            { question: "同学们都走( )教室去了。", options: ["出", "进", "回", "起"], correct: "出" },
            { question: "老师拿( )一本书来。", options: ["出", "去", "进", "回"], correct: "出" },
            { question: "我买( )一些水果来。", options: ["回", "去", "出", "进"], correct: "回" },
            { question: "他一听就站( )了。", options: ["起来", "下来", "出来", "回来"], correct: "起来" }
        ];

        // --- COMPONENTS ---
        const playAudio = (text) => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            window.speechSynthesis.speak(utterance);
        };

        const Flashcards = () => {
            const [index, setIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const nextCard = () => {
                setIsFlipped(false);
                setTimeout(() => setIndex((prev) => (prev + 1) % vocabulary.length), 150);
            };

            const prevCard = () => {
                setIsFlipped(false);
                setTimeout(() => setIndex((prev) => (prev - 1 + vocabulary.length) % vocabulary.length), 150);
            };

            const card = vocabulary[index];

            return (
                <div className="flex flex-col items-center w-full max-w-2xl mx-auto py-8">
                    <div 
                        className="relative w-full h-80 cursor-pointer perspective-1000"
                        onClick={() => setIsFlipped(!isFlipped)}
                    >
                        <div className={`w-full h-full duration-500 preserve-3d relative ${isFlipped ? 'rotate-y-180' : ''}`}>
                            {/* Front */}
                            <div className="absolute w-full h-full backface-hidden bg-slate-800/80 border border-indigo-500/30 backdrop-blur-md rounded-2xl shadow-2xl flex flex-col items-center justify-center p-8">
                                <h2 className="text-8xl font-bold text-transparent bg-clip-text bg-gradient-to-br from-amber-200 to-amber-500 mb-6 drop-shadow-lg">
                                    {card.hanzi}
                                </h2>
                                <button 
                                    onClick={(e) => { e.stopPropagation(); playAudio(card.hanzi); }}
                                    className="p-3 bg-indigo-600/30 hover:bg-indigo-600/60 rounded-full transition-colors mt-4 text-indigo-300 hover:text-white"
                                >
                                    <Volume2 size={28} />
                                </button>
                            </div>
                            
                            {/* Back */}
                            <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-slate-800/90 border border-indigo-500/50 backdrop-blur-md rounded-2xl shadow-2xl flex flex-col items-center justify-center p-8 text-center">
                                <h3 className="text-4xl font-semibold text-indigo-300 mb-4">{card.pinyin}</h3>
                                <div className="w-full h-px bg-slate-700 my-4"></div>
                                <p className="text-2xl text-amber-400 mb-2 font-bold">{card.uz}</p>
                                <p className="text-lg text-slate-300 mb-1">{card.ru}</p>
                                <p className="text-lg text-slate-400 italic">{card.en}</p>
                                <button 
                                    onClick={(e) => { e.stopPropagation(); playAudio(card.hanzi); }}
                                    className="absolute top-4 right-4 p-2 bg-indigo-600/30 hover:bg-indigo-600/60 rounded-full transition-colors text-indigo-300 hover:text-white"
                                >
                                    <Volume2 size={20} />
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex items-center justify-between w-full mt-8 px-4">
                        <button onClick={prevCard} className="flex items-center space-x-2 px-5 py-3 bg-slate-800 hover:bg-indigo-600 rounded-xl transition-colors shadow-lg border border-slate-700 hover:border-indigo-500 text-slate-200">
                            <ChevronLeft size={20} />
                            <span className="font-medium">Oldingi</span>
                        </button>
                        <span className="text-slate-400 font-mono text-lg">{index + 1} / {vocabulary.length}</span>
                        <button onClick={nextCard} className="flex items-center space-x-2 px-5 py-3 bg-slate-800 hover:bg-indigo-600 rounded-xl transition-colors shadow-lg border border-slate-700 hover:border-indigo-500 text-slate-200">
                            <span className="font-medium">Keyingi</span>
                            <ChevronRight size={20} />
                        </button>
                    </div>
                </div>
            );
        };

        const GenericQuiz = ({ data, title }) => {
            const [current, setCurrent] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [selected, setSelected] = useState(null);

            const handleAnswer = (option) => {
                if (selected) return;
                setSelected(option);
                if (option === data[current].correct) {
                    setScore(score + 1);
                }
                setTimeout(() => {
                    setSelected(null);
                    if (current + 1 < data.length) {
                        setCurrent(current + 1);
                    } else {
                        setShowResult(true);
                    }
                }, 1000);
            };

            const reset = () => {
                setCurrent(0);
                setScore(0);
                setShowResult(false);
                setSelected(null);
            };

            if (showResult) {
                return (
                    <div className="max-w-xl mx-auto py-12 text-center bg-slate-800/80 backdrop-blur-md rounded-3xl border border-indigo-500/30 shadow-2xl mt-8">
                        <GraduationCap size={64} className="mx-auto text-amber-400 mb-6" />
                        <h2 className="text-4xl font-bold text-white mb-4">Natija</h2>
                        <p className="text-2xl text-slate-300 mb-8">Siz <span className="text-indigo-400 font-bold">{data.length}</span> ta savoldan <span className="text-amber-400 font-bold">{score}</span> tasiga to'g'ri javob berdingiz.</p>
                        <button onClick={reset} className="inline-flex items-center space-x-2 px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl transition-colors shadow-lg font-medium text-lg">
                            <RotateCcw size={20} />
                            <span>Qayta boshlash</span>
                        </button>
                    </div>
                );
            }

            return (
                <div className="max-w-2xl mx-auto py-8">
                    <div className="bg-slate-800/80 backdrop-blur-md rounded-3xl border border-indigo-500/30 shadow-2xl p-8">
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-xl font-semibold text-indigo-300">{title}</h2>
                            <span className="px-4 py-1.5 bg-slate-900 rounded-full text-amber-400 font-mono text-sm border border-slate-700">
                                {current + 1} / {data.length}
                            </span>
                        </div>
                        
                        <div className="mb-10 text-center">
                            <h3 className="text-4xl md:text-5xl font-bold text-white leading-tight">
                                {data[current].question}
                            </h3>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {data[current].options.map((option, idx) => {
                                let btnClass = "bg-slate-700/50 hover:bg-indigo-600/40 border-slate-600 text-slate-200";
                                let Icon = null;
                                
                                if (selected) {
                                    if (option === data[current].correct) {
                                        btnClass = "bg-green-600/40 border-green-500 text-green-100";
                                        Icon = CheckCircle;
                                    } else if (option === selected) {
                                        btnClass = "bg-red-600/40 border-red-500 text-red-100";
                                        Icon = XCircle;
                                    } else {
                                        btnClass = "opacity-50 bg-slate-700/50 border-slate-700 text-slate-400";
                                    }
                                }
                                
                                return (
                                    <button
                                        key={idx}
                                        onClick={() => handleAnswer(option)}
                                        disabled={selected !== null}
                                        className={`relative p-5 rounded-xl border transition-all duration-200 flex items-center justify-center text-lg font-medium ${btnClass}`}
                                    >
                                        {option}
                                        {Icon && <Icon size={20} className="absolute right-4 opacity-70" />}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const Dialogues = () => {
            return (
                <div className="max-w-4xl mx-auto py-8 space-y-12">
                    {dialogues.map((dialogue, dIdx) => (
                        <div key={dIdx} className="bg-slate-800/60 backdrop-blur-md rounded-3xl border border-indigo-500/20 shadow-xl overflow-hidden">
                            <div className="bg-slate-900/80 px-8 py-5 border-b border-indigo-500/20">
                                <h2 className="text-2xl font-bold text-amber-400">{dialogue.title}</h2>
                            </div>
                            <div className="p-8 space-y-6">
                                {dialogue.lines.map((line, lIdx) => (
                                    <div key={lIdx} className="flex flex-col md:flex-row gap-4 p-5 bg-slate-900/40 rounded-2xl border border-slate-700/50 hover:border-indigo-500/40 transition-colors">
                                        <div className="md:w-32 flex-shrink-0 pt-1">
                                            <span className="inline-block px-3 py-1 bg-indigo-900/60 text-indigo-200 rounded-lg text-sm font-semibold whitespace-nowrap">
                                                {line.speaker}
                                            </span>
                                        </div>
                                        <div className="flex-grow space-y-2">
                                            <div className="flex items-start justify-between gap-4">
                                                <p className="text-2xl font-medium text-white leading-relaxed">{line.hanzi}</p>
                                                <button 
                                                    onClick={() => playAudio(line.hanzi)}
                                                    className="p-2 flex-shrink-0 bg-slate-800 hover:bg-indigo-600 rounded-full transition-colors text-slate-300 hover:text-white"
                                                >
                                                    <Volume2 size={20} />
                                                </button>
                                            </div>
                                            <p className="text-lg text-indigo-300 font-medium">{line.pinyin}</p>
                                            <div className="w-12 h-px bg-slate-700 my-2"></div>
                                            <p className="text-slate-300"><span className="text-amber-500/80 text-sm font-bold mr-2">UZ</span>{line.uz}</p>
                                            <p className="text-slate-400"><span className="text-blue-400/60 text-sm font-bold mr-2">RU</span>{line.ru}</p>
                                            <p className="text-slate-500 italic"><span className="text-green-400/50 text-sm font-bold mr-2">EN</span>{line.en}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const Grammar = () => {
            return (
                <div className="max-w-4xl mx-auto py-8 space-y-10">
                    {grammarPoints.map((point, idx) => (
                        <div key={idx} className="bg-slate-800/80 backdrop-blur-md rounded-3xl border border-indigo-500/30 shadow-2xl p-8">
                            <h2 className="text-3xl font-bold text-amber-400 mb-2">{point.titleUz}</h2>
                            <h3 className="text-lg text-slate-400 mb-6">{point.titleRu} | {point.titleEn}</h3>
                            
                            <div className="space-y-3 mb-8 bg-slate-900/50 p-6 rounded-2xl border border-slate-700/50">
                                <p className="text-lg text-slate-200 leading-relaxed"><span className="font-bold text-indigo-400 mr-2">UZ:</span>{point.descUz}</p>
                                <p className="text-base text-slate-300 leading-relaxed"><span className="font-bold text-blue-400/70 mr-2">RU:</span>{point.descRu}</p>
                                <p className="text-base text-slate-400 italic leading-relaxed"><span className="font-bold text-green-400/60 mr-2">EN:</span>{point.descEn}</p>
                            </div>
                            
                            <h4 className="text-xl font-semibold text-white mb-4 flex items-center">
                                <span className="w-2 h-6 bg-indigo-500 rounded-full mr-3"></span>
                                Misollar (Examples):
                            </h4>
                            
                            <div className="space-y-4">
                                {point.examples.map((ex, eIdx) => (
                                    <div key={eIdx} className="p-5 bg-slate-900/60 rounded-xl border border-slate-700/50 flex items-start gap-4 hover:bg-slate-800 transition-colors">
                                        <button 
                                            onClick={() => playAudio(ex.hanzi)}
                                            className="p-2 flex-shrink-0 bg-slate-800 hover:bg-indigo-600 rounded-full transition-colors text-slate-400 hover:text-white mt-1"
                                        >
                                            <Volume2 size={18} />
                                        </button>
                                        <div>
                                            <p className="text-xl font-medium text-white mb-1">{ex.hanzi}</p>
                                            <p className="text-indigo-300 mb-2">{ex.pinyin}</p>
                                            <p className="text-slate-300 text-sm">{ex.uz}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        function App() {
            const [activeTab, setActiveTab] = useState('Lug\'at');

            const tabs = [
                'Lug\'at', 
                'Lug\'at testi', 
                'So\'zlarni to\'ldirish', 
                'Muloqot', 
                'Grammatika', 
                'Grammatika testi'
            ];

            return (
                <div className="min-h-screen bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-950 via-slate-900 to-black w-full overflow-x-hidden">
                    <div className="max-w-6xl mx-auto px-4 py-12 flex flex-col min-h-screen">
                        
                        {/* Header */}
                        <header className="text-center mb-12 relative z-10">
                            <div className="inline-block mb-4 px-4 py-1.5 rounded-full bg-indigo-900/50 border border-indigo-500/30 text-indigo-300 text-sm font-semibold tracking-wide">
                                HSK 2 - Lesson 14
                            </div>
                            <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-white to-indigo-200 mb-4 drop-shadow-sm">
                                一个人过年多没意思啊
                            </h1>
                            <h2 className="text-xl text-slate-400 font-medium tracking-wide">
                                Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
                            </h2>
                        </header>

                        {/* Navigation Tabs */}
                        <div className="flex flex-wrap justify-center gap-2 mb-10 relative z-10">
                            {tabs.map((tab) => (
                                <button
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`px-5 py-3 rounded-full text-sm font-semibold transition-all duration-300 border ${
                                        activeTab === tab 
                                            ? 'bg-indigo-600 border-indigo-500 text-white shadow-[0_0_20px_rgba(79,70,229,0.4)]' 
                                            : 'bg-slate-800/50 border-slate-700/50 text-slate-400 hover:text-slate-200 hover:bg-slate-700'
                                    }`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>

                        {/* Main Content Area */}
                        <main className="flex-grow relative z-10 w-full">
                            {activeTab === 'Lug\'at' && <Flashcards />}
                            {activeTab === 'Lug\'at testi' && <GenericQuiz data={vocabQuizData} title="Lug'at testi" />}
                            {activeTab === 'So\'zlarni to\'ldirish' && <GenericQuiz data={fillBlanksData} title="So'zlarni to'ldirish" />}
                            {activeTab === 'Muloqot' && <Dialogues />}
                            {activeTab === 'Grammatika' && <Grammar />}
                            {activeTab === 'Grammatika testi' && <GenericQuiz data={grammarQuizData} title="Grammatika testi" />}
                        </main>

                        {/* Footer */}
                        <footer className="mt-20 pt-8 border-t border-slate-800/80 text-center relative z-10">
                            <p className="text-slate-500 font-medium">HSK 2 NEW3.0 - Lesson 14</p>
                            <p className="text-slate-600 text-sm mt-1">© 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
                        </footer>

                    </div>
                </div>
            );
        }

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
